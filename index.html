<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic GO - Tienda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #ffffff;
      color: #053b82;
      -webkit-font-smoothing: antialiased;
    }

    .medic-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 30px 40px 80px;
      position: relative;
    }

    /* HEADER */
    .medic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      gap: 30px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1;
    }

    .logo-top {
      font-size: 34px;
      font-weight: 800;
      color: #053b82;
      letter-spacing: -0.5px;
    }

    .logo-bottom {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      margin-top: -6px;
    }

    .logo-go {
      font-size: 52px;
      font-weight: 900;
      color: #053b82;
      letter-spacing: -1.5px;
    }
    
    .logo-plus-container {
      position: relative;
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      margin-left: 4px;
    }
    
    .logo-plus-main {
      position: absolute;
      width: 100%;
      height: 100%;
      color: #053b82;
    }
    
    .logo-plus-dot {
      position: absolute;
      top: -2px;
      right: -4px;
      width: 8px;
      height: 8px;
      background: #053b82;
      border-radius: 1px;
    }

    .logo-text {
      font-size: 9px;
      font-weight: 800;
      color: #005dfc;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    .search-container {
      flex: 1;
      max-width: 760px;
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      padding: 6px 6px 6px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    .search-icon {
      width: 20px;
      height: 20px;
      color: #053b82;
      margin-right: 12px;
    }

    .search-container input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      color: #053b82;
      font-weight: 500;
    }

    .search-container input::placeholder {
      color: #64748b;
    }

    .search-btn {
      background: #005dfc;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-btn:hover {
      background: #004ee6;
    }

    .account {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #053b82;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }

    .account svg {
      width: 20px;
      height: 20px;
    }
    
    .account-chevron {
      width: 14px !important;
      height: 14px !important;
      margin-left: 2px;
      stroke-width: 2.5;
    }

    /* HERO */
    .hero-card {
      background: #f4f8fe;
      border-radius: 36px;
      padding: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .hero-content {
      flex: 1;
      max-width: 500px;
    }

    .pill {
      display: inline-block;
      background: #8abdfc;
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 18px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .hero-content h1 {
      font-size: 44px;
      color: #053b82;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .hero-content h2 {
      font-size: 24px;
      color: #053b82;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 32px;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #005dfc;
      color: #ffffff;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      box-shadow: 0 8px 24px rgba(0, 93, 252, 0.3);
      transition: transform 0.2s, background 0.2s;
    }

    .primary-btn:hover {
      background: #004ee6;
      transform: translateY(-2px);
    }

    .hero-image-container {
      position: relative;
      width: 500px;
      height: 250px;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
    }

    .discount-badge {
      position: absolute;
      top: 15px;
      right: -25px;
      width: 86px;
      height: 86px;
      background: #62a0fc;
      color: #ffffff;
      font-size: 40px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 8px 24px rgba(98, 160, 252, 0.4);
    }

    /* SLIDER DOTS */
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 36px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #d3e4fa;
      border-radius: 50px;
    }

    .dot.active {
      width: 32px;
      background: #005dfc;
    }

    /* CATEGORY CARDS */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      position: relative;
    }

    .category-card {
      background: #f4f8fe;
      border-radius: 36px;
      padding: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .category-content {
      flex: 1;
      max-width: 220px;
    }

    .category-content h3 {
      font-size: 32px;
      color: #053b82;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .category-content p {
      font-size: 16px;
      color: #053b82;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
    }

    .category-image {
      width: 250px;
      height: 180px;
      object-fit: cover;
      border-radius: 24px;
      margin-left: 20px;
    }

    /* DECORATIONS */
    .decor-cross {
      position: absolute;
      bottom: -30px;
      left: calc(50% - 20px);
      width: 44px;
      height: 44px;
      color: #dbe9fc;
    }

    /* IA BUTTON */
    .ia-button {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 64px;
      height: 64px;
      background: #003e9a;
      color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(0, 62, 154, 0.3);
      z-index: 100;
    }
    
    /* MOBILE RESPONSIVE */
    @media (max-width: 900px) {
      .medic-header {
        flex-wrap: wrap;
      }
      .search-container {
        order: 3;
        max-width: 100%;
      }
      .hero-card {
        flex-direction: column;
        padding: 40px;
      }
      .hero-image-container {
        width: 100%;
        max-width: 500px;
        margin-top: 40px;
      }
      .category-grid {
        grid-template-columns: 1fr;
      }
      .category-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .category-image {
        width: 100%;
        margin-left: 0;
        margin-top: 24px;
      }
    }
    
    @media (max-width: 560px) {
      .medic-page {
        padding: 12px 12px 20px;
      }
      .medic-header {
        flex-wrap: nowrap;
        gap: 12px;
        margin-bottom: 12px;
      }
      
      .search-container {
        order: initial;
        flex: 1;
        padding: 6px 12px;
      }
      
      .search-container input {
        font-size: 13px;
        min-width: 0;
      }
      
      .search-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-right: 6px;
      }
      
      .search-btn { display: none; }
      .account span { display: none; }
      
      .logo-top { font-size: 18px; letter-spacing: 0; }
      .logo-go { font-size: 28px; letter-spacing: -1.5px; }
      .logo-plus-container { width: 17px; height: 17px; margin-bottom: 5px; }
      .logo-text { display: none; }
      
      /* Compress Hero Section */
      .hero-card {
        padding: 16px;
        margin-bottom: 12px;
        border-radius: 20px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }
      .hero-content {
        flex: 1;
      }
      .pill {
        margin-bottom: 8px;
        font-size: 9px;
        padding: 4px 10px;
      }
      .hero-content h1 {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .hero-content h2 {
        font-size: 12px;
        margin-bottom: 10px;
      }
      .primary-btn {
        width: 100%;
        justify-content: center;
        padding: 8px;
        font-size: 11px;
      }
      .primary-btn svg {
        width: 12px;
        height: 12px;
      }
      .hero-image-container {
        width: 40%;
        height: 120px;
        margin-top: 0;
      }
      .discount-badge {
        width: 40px;
        height: 40px;
        font-size: 16px;
        top: -10px;
        right: -10px;
      }
      .slider-dots {
        margin-bottom: 12px;
      }
      
      /* Compress Category Cards */
      .category-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .category-card {
        padding: 12px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }
      .category-content {
        display: contents;
      }
      .category-content h3 {
        font-size: 16px;
        margin-bottom: 4px;
        order: 1;
      }
      .category-content p {
        font-size: 11px;
        margin-bottom: 8px;
        line-height: 1.2;
        order: 2;
      }
      .category-image {
        width: 100%;
        height: 100px;
        margin-top: 4px;
        margin-bottom: 12px;
        margin-left: 0;
        border-radius: 12px;
        order: 3;
      }
      .category-content .primary-btn {
        order: 4;
      }
      .ia-button {
        width: 44px;
        height: 44px;
        font-size: 14px;
        bottom: 12px;
        right: 12px;
      }
      .decor-cross {
        display: none;
      }
    }
  </style>
</head>
<body>

  <main class="medic-page">
    
    <!-- HEADER -->
    <header class="medic-header">
      <div class="logo">
        <div class="logo-top">medic</div>
        <div class="logo-bottom">
          <span class="logo-go">GO</span>
          <div class="logo-plus-container">
            <svg class="logo-plus-main" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 2h8v6h6v8h-6v6H8v-6H2V8h6V2z"/>
            </svg>
            <div class="logo-plus-dot"></div>
          </div>
        </div>
        <div class="logo-text">TU FARMACIA AL COSTO</div>
      </div>

      <div class="search-container">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" placeholder="Buscar productos, marcas y más..." />
        <button class="search-btn">Buscar</button>
      </div>

      <div class="account">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Mi cuenta</span>
        <svg class="account-chevron" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero-card">
      <div class="hero-content">
        <span class="pill">Cuidá tu salud</span>
        <h1>Hasta 40% OFF</h1>
        <h2>en medicamentos seleccionados</h2>
        <a href="#" class="primary-btn">
          Ver ofertas
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>
        </a>
      </div>

      <div class="hero-image-container">
        <img class="hero-image" src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=900&q=80" alt="Farmacéutica" />
        <div class="discount-badge">%</div>
      </div>
    </section>

    <!-- SLIDER DOTS -->
    <div class="slider-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>

    <!-- CATEGORY SECTION -->
    <section class="category-grid">
      <article class="category-card">
        <div class="category-content">
          <h3>FARMACIA</h3>
          <p>Todo lo que necesitás para tu salud.</p>
          <a href="#" class="primary-btn">
            Ver productos
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"></path>
            </svg>
          </a>
        </div>
        <img class="category-image" src="https://images.unsplash.com/photo-1587854692152-cbe660dbde88?auto=format&fit=crop&w=700&q=80" alt="Farmacia" />
      </article>

      <article class="category-card">
        <div class="category-content">
          <h3>VETERINARIA</h3>
          <p>Cuidado y bienestar para tus mascotas.</p>
          <a href="#" class="primary-btn">
            Ver productos
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"></path>
            </svg>
          </a>
        </div>
        <img class="category-image" src="https://images.unsplash.com/photo-1628009368231-7bb7cfcb0def?auto=format&fit=crop&w=700&q=80" alt="Veterinaria" />
      </article>

      <!-- DECORATIVE CROSS -->
      <svg class="decor-cross" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 2h8v6h6v8h-6v6H8v-6H2V8h6V2z"/>
      </svg>
    </section>

    <!-- IA BUTTON -->
    <a href="#" class="ia-button">IA</a>

  </main>

</body>
</html>
